name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      POSTGRES_DOCKER_VERSION: postgres:17-alpine
      REDIS_DOCKER_VERSION: redis:7-alpine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm eslint src

      - name: Test Unit
        run: pnpm test:unit

      - name: Test Integration
        run: pnpm test:integration
