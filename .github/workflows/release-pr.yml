name: Release Prep

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-prep-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  prepare_release:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare release artifacts
        id: prepare_release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: pnpm release:publish

      - name: Commit release updates to dev
        if: steps.prepare_release.outputs.release_created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md .release-plans .release-output
          git commit -m "chore(release): prepare ${{ steps.prepare_release.outputs.release_tag }}"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Update PR body with consolidated release notes
        if: steps.prepare_release.outputs.release_created == 'true'
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.prepare_release.outputs.release_tag }}
          RELEASE_NOTES_PATH: ${{ steps.prepare_release.outputs.release_notes_path }}
        with:
          script: |
            const fs = require('node:fs');

            const notesPath = process.env.RELEASE_NOTES_PATH;
            const releaseTag = process.env.RELEASE_TAG;
            const notes = fs.readFileSync(notesPath, 'utf8').trim();
            const body = [
              `Automated release prep for \`${releaseTag}\`.`,
              '',
              'This PR body is generated from the consolidated changelog entry produced from pending release plans on `dev`.',
              '',
              notes
            ].join('\n');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body
            });
